<html lang="en">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aware Swim</title>
<link rel="icon" type="image/png" href="A.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --warm-white:#f0ece4;
  --stone:#a89e8e;
  --earth:#8b7355;
  --text-dark:#1a1108;
  --text-mid:#3d3028;
  --text-light:#4a3d32;
  --text-xlight:#5a4d40;
}
html,body{height:100%;margin:0}
body{
  font-family:'Cormorant Garamond',serif;
  background:var(--warm-white);
  color:var(--text-dark);
  min-height:100vh;
  position:relative;
}
.corner{position:fixed;width:16px;height:16px;z-index:2;opacity:0.4}
.corner-tl{top:1.8rem;left:1.8rem;border-top:0.5px solid var(--stone);border-left:0.5px solid var(--stone)}
.corner-tr{top:1.8rem;right:1.8rem;border-top:0.5px solid var(--stone);border-right:0.5px solid var(--stone)}
.corner-bl{bottom:1.8rem;left:1.8rem;border-bottom:0.5px solid var(--stone);border-left:0.5px solid var(--stone)}
.corner-br{bottom:1.8rem;right:1.8rem;border-bottom:0.5px solid var(--stone);border-right:0.5px solid var(--stone)}
.year-mark{
  position:fixed;top:50%;right:2rem;
  transform:translateY(-50%) rotate(90deg);
  font-family:'Jost',sans-serif;font-size:0.65rem;
  letter-spacing:0.35em;text-transform:uppercase;
  color:var(--text-xlight);z-index:3;white-space:nowrap;opacity:0.8;
}
/* FIXED HEADER */
.top-header{
  position:fixed;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:center;
  padding:1.8rem 2rem;
  z-index:10;
  background:rgba(240,236,228,0.95);
  backdrop-filter:blur(12px);
  animation:fadeUp 1s ease both;
}
.logo-img{
  width:min(200px,40vw);
  height:auto;
}
/* MAIN CONTENT */
.content{
  display:flex;flex-direction:column;
  align-items:center;text-align:center;
  width:100%;max-width:560px;
  margin:0 auto;
  padding:16rem 2rem 9rem;
}
.headline{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(3rem,8vw,5.5rem);
  font-weight:300;line-height:1;
  letter-spacing:0.12em;
  color:var(--text-dark);
  text-transform:uppercase;
  margin-bottom:1.8rem;
  animation:fadeUp 1s 0.15s ease both;
}
.headline em{font-style:italic;color:var(--earth);display:block}
.divider{
  width:2rem;height:0.5px;
  background:var(--stone);
  margin:0 auto 1.4rem;
  animation:fadeUp 1s 0.25s ease both;
}
.tagline{
  font-family:'Jost',sans-serif;font-size:0.85rem;
  letter-spacing:0.3em;text-transform:uppercase;
  color:var(--text-mid);font-weight:300;
  margin-bottom:0.9rem;
  animation:fadeUp 1s 0.35s ease both;
}
.copy{
  font-family:'Cormorant Garamond',serif;font-size:1.35rem;
  font-style:italic;font-weight:300;color:var(--text-light);
  line-height:1.8;margin-bottom:2rem;
  animation:fadeUp 1s 0.4s ease both;
}
.form-wrap{
  width:100%;max-width:400px;
  animation:fadeUp 1s 0.5s ease both;
}
.input-row{
  display:flex;align-items:center;
  border-bottom:1px solid var(--stone);
  margin-bottom:0.85rem;transition:border-color 0.3s;
}
.input-row:focus-within{border-bottom-color:var(--earth)}
.email-input{
  flex:1;background:transparent;border:none;outline:none;
  font-family:'Jost',sans-serif;font-size:0.85rem;font-weight:300;
  letter-spacing:0.15em;text-transform:uppercase;
  color:var(--text-dark);padding:0.9rem 0;min-width:0;
}
.email-input::placeholder{color:var(--text-xlight);font-size:0.75rem;letter-spacing:0.18em}
.submit-btn{
  background:none;border:none;cursor:pointer;
  font-family:'Jost',sans-serif;font-size:0.75rem;
  letter-spacing:0.2em;text-transform:uppercase;
  color:var(--text-mid);padding:0 0 0 1rem;
  transition:color 0.3s;white-space:nowrap;flex-shrink:0;
}
.submit-btn:hover{color:var(--text-dark)}
.form-note{
  font-family:'Jost',sans-serif;font-size:0.7rem;
  letter-spacing:0.15em;text-transform:uppercase;color:var(--text-xlight);
}
.success{
  display:none;flex-direction:column;
  align-items:center;gap:1rem;
  animation:fadeUp 0.6s ease both;
}
.success p{
  font-family:'Cormorant Garamond',serif;font-size:1.3rem;
  font-style:italic;color:var(--text-light);line-height:1.9;
}
/* FIXED FOOTER */
.bottom-row{
  position:fixed;bottom:1.6rem;
  left:0;right:0;
  display:flex;align-items:center;justify-content:center;
  gap:1.2rem;z-index:10;padding:0 2rem;
  animation:fadeUp 1s 0.6s ease both;
}
.bottom-handle{
  font-family:'Cormorant Garamond',serif;font-size:1rem;
  font-style:italic;color:var(--text-xlight);
  font-weight:300;letter-spacing:0.05em;white-space:nowrap;
}
.social-link{
  font-family:'Jost',sans-serif;font-size:0.7rem;
  letter-spacing:0.22em;text-transform:uppercase;
  color:var(--text-xlight);text-decoration:none;
  transition:color 0.3s;white-space:nowrap;
}
.social-link:hover{color:var(--text-dark)}
@media(max-width:480px){
  .year-mark{display:none}
  .bottom-handle{display:none}
  .bottom-row{gap:2rem}
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
</style>
</head>
