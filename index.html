<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aware Swim</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#f5f0e8;
  --warm-white:#faf8f4;
  --stone:#c8bfaf;
  --earth:#8b7355;
  --text-dark:#2a2118;
  --text-light:#a09080;
  --text-xlight:#c4b8a8;
}
html,body{height:100%}
body{
  font-family:'Cormorant Garamond',serif;
  background:var(--warm-white);
  color:var(--text-dark);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  position:relative;
  padding-bottom:5rem;
}

.corner{position:fixed;width:16px;height:16px;z-index:2;opacity:0.2}
.corner-tl{top:1.8rem;left:1.8rem;border-top:0.5px solid var(--stone);border-left:0.5px solid var(--stone)}
.corner-tr{top:1.8rem;right:1.8rem;border-top:0.5px solid var(--stone);border-right:0.5px solid var(--stone)}
.corner-bl{bottom:1.8rem;left:1.8rem;border-bottom:0.5px solid var(--stone);border-left:0.5px solid var(--stone)}
.corner-br{bottom:1.8rem;right:1.8rem;border-bottom:0.5px solid var(--stone);border-right:0.5px solid var(--stone)}

.content{
  position:relative;z-index:3;
  display:flex;flex-direction:column;
  align-items:center;
  text-align:center;
  padding:2rem;
  max-width:500px;
  width:100%;
}

.logo{
  font-family:'Cormorant Garamond',serif;
  font-size:0.8rem;
  font-weight:400;
  letter-spacing:0.55em;
  text-transform:uppercase;
  color:var(--text-xlight);
  margin-bottom:3.5rem;
  animation:fadeUp 1s ease both;
}

.headline{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(3rem,8vw,6rem);
  font-weight:300;
  line-height:0.92;
  letter-spacing:0.08em;
  color:var(--text-dark);
  text-transform:uppercase;
  animation:fadeUp 1s 0.1s ease both;
}

.headline em{
  font-style:italic;
  color:var(--earth);
  display:block;
}

.divider{
  width:2rem;height:0.5px;
  background:var(--stone);
  margin:2.5rem auto;
  animation:fadeUp 1s 0.2s ease both;
}

.tagline{
  font-family:'Jost',sans-serif;
  font-size:0.6rem;
  letter-spacing:0.35em;
  text-transform:uppercase;
  color:var(--text-xlight);
  font-weight:200;
  margin-bottom:0.75rem;
  animation:fadeUp 1s 0.3s ease both;
}

.copy{
  font-family:'Cormorant Garamond',serif;
  font-size:1.05rem;
  font-style:italic;
  font-weight:300;
  color:var(--text-light);
  line-height:1.8;
  margin-bottom:2.8rem;
  animation:fadeUp 1s 0.35s ease both;
}

.form-wrap{
  width:100%;
  max-width:380px;
  animation:fadeUp 1s 0.45s ease both;
}

.input-row{
  display:flex;
  align-items:center;
  border-bottom:0.5px solid var(--stone);
  margin-bottom:1rem;
  transition:border-color 0.3s;
}

.input-row:focus-within{border-bottom-color:var(--earth)}

.email-input{
  flex:1;
  background:transparent;
  border:none;outline:none;
  font-family:'Jost',sans-serif;
  font-size:0.68rem;
  font-weight:200;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--text-dark);
  padding:0.9rem 0;
  min-width:0;
}

.email-input::placeholder{
  color:var(--text-xlight);
  font-size:0.6rem;
  letter-spacing:0.22em;
}

.submit-btn{
  background:none;border:none;cursor:pointer;
  font-family:'Jost',sans-serif;
  font-size:0.55rem;
  letter-spacing:0.22em;
  text-transform:uppercase;
  color:var(--text-light);
  padding:0 0 0 1rem;
  transition:color 0.3s;
  white-space:nowrap;
  flex-shrink:0;
}

.submit-btn:hover{color:var(--text-dark)}

.form-note{
  font-family:'Jost',sans-serif;
  font-size:0.52rem;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--text-xlight);
}

.success{
  display:none;
  flex-direction:column;
  align-items:center;
  gap:1rem;
  animation:fadeUp 0.6s ease both;
}

.success p{
  font-family:'Cormorant Garamond',serif;
  font-size:1.1rem;
  font-style:italic;
  color:var(--text-light);
  line-height:1.9;
}

/* BOTTOM ROW */
.bottom-row{
  position:fixed;
  bottom:1.8rem;
  left:0;right:0;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:1.2rem;
  z-index:3;
  animation:fadeUp 1s 0.6s ease both;
  padding:0 2rem;
}

.bottom-handle{
  font-family:'Cormorant Garamond',serif;
  font-size:0.85rem;
  font-style:italic;
  color:var(--text-xlight);
  font-weight:300;
  letter-spacing:0.05em;
  white-space:nowrap;
}

.bottom-dot{
  width:2px;height:2px;border-radius:50%;
  background:var(--text-xlight);
  opacity:0.4;
  flex-shrink:0;
}

.social-link{
  font-family:'Jost',sans-serif;
  font-size:0.52rem;
  letter-spacing:0.22em;
  text-transform:uppercase;
  color:var(--text-xlight);
  text-decoration:none;
  transition:color 0.3s;
  white-space:nowrap;
}

.social-link:hover{color:var(--text-dark)}

/* YEAR */
.year-mark{
  position:fixed;
  top:50%;right:2rem;
  transform:translateY(-50%) rotate(90deg);
  font-family:'Jost',sans-serif;
  font-size:0.5rem;
  letter-spacing:0.35em;
  text-transform:uppercase;
  color:var(--text-xlight);
  z-index:3;
  white-space:nowrap;
  opacity:0.5;
}

@media(max-width:480px){
  .year-mark{display:none}
  .bottom-handle{display:none}
  .bottom-dot{display:none}
  .bottom-row{gap:2rem}
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
</style>
</head>
<body>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>
<span class="year-mark">Fall 2026</span>

<div class="content">
  <p class="logo">Aware Swim</p>

  <h1 class="headline">
    Coming<br><em>soon</em>
  </h1>

  <div class="divider"></div>

  <p class="tagline">Luxury Sustainable Swimwear</p>
  <p class="copy">Be the first to know.</p>

  <div class="form-wrap">
    <div id="formState">
      <div class="input-row">
        <input class="email-input" type="email" id="emailInput" placeholder="Your email address"/>
        <button class="submit-btn" onclick="handleSubmit()">Notify me →</button>
      </div>
      <p class="form-note">No spam. Just the drop.</p>
    </div>
    <div class="success" id="successState">
      <div class="divider" style="margin:0 auto"></div>
      <p>You're on the list.<br>We'll be in touch.</p>
      <div class="divider" style="margin:0 auto"></div>
    </div>
  </div>
</div>

<div class="bottom-row">
  <a class="social-link" href="https://instagram.com/awareswim" target="_blank">Instagram</a>
  <div class="bottom-dot"></div>
  <span class="bottom-handle">@awareswim</span>
  <div class="bottom-dot"></div>
  <a class="social-link" href="https://tiktok.com/@awareswim" target="_blank">TikTok</a>
</div>

<script>
function handleSubmit(){
  const val=document.getElementById('emailInput').value.trim();
  if(!val||!val.includes('@')){
    document.querySelector('.input-row').style.borderBottomColor='rgba(180,80,60,0.4)';
    return;
  }
  document.getElementById('formState').style.display='none';
  const s=document.getElementById('successState');
  s.style.display='flex';
}
</script>
</body>
</html>
